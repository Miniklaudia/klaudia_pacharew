  let textIndex = 0;
  let charIndex = 0;
  let typedLines = [];
  let currentLine = "";
  let delay = 10;
  let startTime = 0;
  let scrollY = 0;

  function setup() {
    let canvas = createCanvas(windowWidth, windowHeight);
    canvas.parent("canvas-container");
    textFont("Courier");
    textSize(20);
    fill(170);
    frameRate(60);
  }

  function draw() {
    background(17);
    textAlign(LEFT, TOP);
    translate(0, -scrollY);

    // Draw typed lines with glitch
    for (let i = 0; i < typedLines.length; i++) {
      drawGlitchText(typedLines[i], 20, 40 + i * 25);
    }

    drawGlitchText(currentLine, 20, 40 + typedLines.length * 25);

    // Typewriter logic
    if (millis() - startTime > delay) {
      if (charIndex < textArray[textIndex].length) {
        currentLine += textArray[textIndex].charAt(charIndex);
        charIndex++;
        scrollY = max(0, (typedLines.length + 1) * 40 - height + 40);
        startTime = millis();
      } else {
        typedLines.push(currentLine);
        currentLine = "";
        charIndex = 0;
        textIndex++;
        if (textIndex >= textArray.length) {
          textIndex = 0;
          typedLines = [];
          scrollY = 0;
        }
        startTime = millis();
      }
    }
  }

  // Subtle glitch effect
  function drawGlitchText(str, x, y) {
    push();
    fill(170);
    text(str, x, y);

    for (let i = 0; i < str.length; i++) {
      if (random() < 0.02) { // 2% chance to glitch
        let offsetX = random(-2, 2);
        let offsetY = random(-2, 2);
        fill(random([255, 0, 170]));
        text(str.charAt(i), x + i * textWidth(' ') + offsetX, y + offsetY);
      }
    }
    pop();
  }

  function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
