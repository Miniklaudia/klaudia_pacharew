<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>research</title>

<link rel="stylesheet" href="css/base/reset.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/pages/research.css">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;500&display=swap" rel="stylesheet">


</head>

<body class="research">

<main>

<h1 class="glitch">research</h1>

<p class="subtitle">
This page contains my academic reflections, methodology notes, and theoretical frameworks. Click a folder to explore files and documents.
</p>

<div class="folder-grid">

  <div class="folder" data-folder="Essays">
    <img class="folder-preview" src="" data-img="essays.JPG">
    <div class="folder-name">Essays</div>
  </div>

  <div class="folder" data-folder="Project Development">
    <img class="folder-preview" src="" data-img="development.png">
    <div class="folder-name">Project Development</div>
  </div>

  <div class="folder" data-folder="Future works">
    <img class="folder-preview" src="" data-img="future.png">
    <div class="folder-name">Future works</div>
  </div>

  <div class="folder" data-folder="Workshops and Lectures">
    <img class="folder-preview" src="" data-img="workshops.png">
    <div class="folder-name">Workshops & Lectures</div>
  </div>

</div>

<div class="popup-overlay" id="popup">
  <div class="popup-content">
    <div class="popup-close" id="close">&times;</div>
    <h2 id="title"></h2>
    <ul class="file-list" id="list"></ul>
  </div>
</div>

<nav>
  <a href="index.html">home</a>
  <a href="archive.html">archive</a>
</nav>

</main>

<script>
/* =========================
R2 BASES
========================= */
const IMG_BASE = "https://pub-e3bf6ce01e0948019faa273c5ebc10ba.r2.dev/images/research/";
const DOC_BASE = "https://pub-e3bf6ce01e0948019faa273c5ebc10ba.r2.dev/research/";

/* =========================
FOLDER IMAGES
========================= */
document.querySelectorAll(".folder-preview").forEach(img => {
  img.src = IMG_BASE + img.dataset.img;
});

/* =========================
FILES
========================= */
const folders = document.querySelectorAll(".folder");
const popup = document.getElementById("popup");
const title = document.getElementById("title");
const list = document.getElementById("list");
const close = document.getElementById("close");

const folderFiles = {
  "Essays": [
    "History of Sublime.pdf",
    "The Politics of Glitch.pdf",
    "What do you envision a 'technological sublime' to be_.pdf"
  ],
  "Project Development": [
    "project 01 (mis)communication encounter with the glitch - Documentation Log.pdf",
    "project 02 The Dawn of Generation 404 - Documentation Log.pdf",
    "project_03 We are the Weather - Documentation Log.pdf"
  ],
  "Future works": [
    "Elf.png"
  ],
  "Workshops and Lectures": [
    "TouchDesigner Workshop Notes.pdf",
    "TouchDesigner Workshop.pdf",
    "Postinternet debate.mp4"
  ]
};

folders.forEach(folder => {
  folder.addEventListener("click", () => {

    const key = folder.dataset.folder;
    title.textContent = key;
    list.innerHTML = "";

    (folderFiles[key] || []).forEach(file => {
      const li = document.createElement("li");
      const a = document.createElement("a");

      a.textContent = file;

      // IMPORTANT: documents come from personalwebsite bucket
      a.href = DOC_BASE + encodeURIComponent(key) + "/" + encodeURIComponent(file);

      a.target = "_blank";

      li.appendChild(a);
      list.appendChild(li);
    });

    popup.style.display = "flex";
  });
});

close.onclick = () => popup.style.display = "none";
popup.onclick = (e) => {
  if (e.target === popup) popup.style.display = "none";
};
</script>

</body>
</html>
