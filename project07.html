<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>project 07</title>

 <link rel="stylesheet" href="css/base/reset.css">
  <link rel="stylesheet" href="css/main.css">

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;500&display=swap" rel="stylesheet">

  <style>
    /* =========================
       BACKGROUND LAYER
    ========================= */
    .background-image {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: url("https://pub-e3bf6ce01e0948019faa273c5ebc10ba.r2.dev/images/Project07/background.jpg") center/cover no-repeat;
      z-index: -3;
    }

    #rectangles-bg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: -2;
      pointer-events: none;
    }

    main {
      position: relative;
      z-index: 2;
    }

    /* =========================
       LAYOUT FIX (IMPORTANT)
    ========================= */

    .project-content {
      display: flex;
      flex-direction: column; /* FORCE STACKING */
      gap: 2rem;
    }

    .text-box {
      width: 100%;
    }

    .gallery {
      width: 100%;
      margin-top: 2rem; /* guarantees separation */
    }

    .gallery-container {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .gallery-container img,
    .gallery-container video {
      max-width: 100%;
      max-height: 500px;
      object-fit: contain;
      display: block;
    }

    .arrow {
      font-size: 2rem;
      background: none;
      border: none;
      cursor: pointer;
      color: white;
      margin: 0 1rem;
    }

    /* =========================
       MOBILE SAFETY
    ========================= */
    @media (max-width: 768px) {
      .gallery-container img,
      .gallery-container video {
        max-height: 300px;
      }

      .arrow {
        font-size: 1.5rem;
      }
    }

    /* =========================
       BACK TO TOP BUTTON
    ========================= */
    #scrollTopBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 10;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 0 15px 5px rgba(255,255,255,0.7);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      opacity: 0.9;
    }

    #scrollTopBtn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px 10px rgba(255,255,255,0.9);
      opacity: 1;
    }
  </style>
</head>

<body class="project project07">

  <!-- BACKGROUND -->
  <div class="background-image"></div>
  <canvas id="rectangles-bg"></canvas>

  <main>

    <h1 class="glitch" data-text="project 07">
      project 07: Algorithm: Sea of unknown data
    </h1>

    <div class="project-content">

      <div class="text-box">
        <h2>[ Enquiry ]</h2>
        <p>
          A vital aspect of my work is awakening the body's activity and heightening the senses. This leads to my interest in Brechtian Epic Theatre...
        </p>

        <h2>[ Medium and Software ]</h2>
        <p>TouchDesigner, video, creative coding, fabric and wood.</p>
      </div>

      <!-- GALLERY (NOW ALWAYS BELOW TEXT) -->
      <div class="gallery">

        <div class="gallery-container">
          <img
            id="gallery-image"
            src="https://pub-e3bf6ce01e0948019faa273c5ebc10ba.r2.dev/images/Project07/project07-1.jpg"
            alt="project 07 image"
          />

          <video id="gallery-video" controls style="display:none;"></video>
        </div>

        <div style="display:flex; justify-content:center; align-items:center;">
          <button class="arrow left">&#10094;</button>
          <button class="arrow right">&#10095;</button>
        </div>

      </div>

    </div>

    <nav>
      <a href="archive.html">return to archive</a>
    </nav>

  </main>

  <button id="scrollTopBtn">↑</button>

  <script src="js/project07.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("scrollTopBtn").addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  </script>

</body>
</html>
