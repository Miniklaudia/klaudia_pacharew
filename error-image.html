<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>system error</title>

<link rel="stylesheet" href="css/base/reset.css">
<link rel="stylesheet" href="css/main.css">

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: 'IBM Plex Mono', monospace;
}

/* FULL GLITCH IMAGE BACKGROUND */
.bg {
  position: fixed;
  top: 50%;
  left: 50%;

  width: min(1000px, 80vw);
  height: min(800px, 80vh);

  transform: translate(-50%, -50%) scale(1);

  background-image: url("https://pub-e3bf6ce01e0948019faa273c5ebc10ba.r2.dev/images/Ilovemyputer.jpg");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;

  filter: contrast(1.3) brightness(0.7) saturate(0.8);

  animation: pulseGlitch 4s infinite ease-in-out;

  z-index: 1;
}


.bg::after {
  content: "";
  position: absolute;
  inset: 0;

  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 0 40px rgba(0,255,255,0.1);

  pointer-events: none;
}
/* TEXT OVERLAY */
.overlay {
  position: relative;
  z-index: 2;
  color: white;
  padding: 3rem;
  mix-blend-mode: difference;
}

h1 {
  font-size: 2.5rem;
}

p {
  max-width: 40ch;
  opacity: 0.8;
}

/* subtle glitch movement */
@keyframes pulseGlitch {
  0% {
    transform: translate(-50%, -50%) scale(1);
  }

  50% {
    transform: translate(-50%, -50%) scale(1.05);
  }

  100% {
    transform: translate(-50%, -50%) scale(1.02);
  }
}
</style>

</head>

<body>

<div class="bg"></div>
<div class="glitch-noise"></div>

<div class="overlay">
  <h1>system corruption detected</h1>
  <p>
    archive node failed to resolve.<br>
    memory fragment unstable.
  </p>

  <p><a href="archive.html" style="color:#0ff;">return to archive →</a></p>
</div>

</body>
</html>
